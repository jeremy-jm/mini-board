services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: miniboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miniboard"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Backend service
  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/miniboard?schema=public
    ports:
      - "3001:3001"
    depends_on:
      - postgres:
          condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Frontend service
  frontend:
    build: ./frontend
    restart: always
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
