name: Publish Images

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Push GHCR Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: mini-board-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image_name: mini-board-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: mini-board-nginx
            context: .
            dockerfile: ./nginx/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=raw,value=prd,enable=${{ github.ref_name == 'master' }}
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
