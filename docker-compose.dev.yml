# =============================================================================
# Development stack (no nginx)
# =============================================================================
# From repo root:
#   docker compose -f docker-compose.dev.yml up --build
#
# URLs:
#   Frontend (Vite):     http://localhost:5173
#   Backend API:         http://localhost:3001/api/...
#   PostgreSQL (host):   localhost:5432  (for local GUI clients)
#
# The browser only talks to :5173. Vite dev server proxies /api -> backend:3001
# (see vite.config.ts and VITE_PROXY_TARGET below).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-miniboard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miniboard"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/miniboard?schema=public}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Vite proxy target inside the container (service name, not localhost)
      VITE_PROXY_TARGET: http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data_dev:
