# Production nginx: SPA static files + reverse proxy to Fastify backend.
# Browser uses same origin: /api/* -> backend:3001/api/*

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: client-side routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: forward full URI to backend (Fastify mounts routes under /api)
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
