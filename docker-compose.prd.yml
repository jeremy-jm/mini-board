# =============================================================================
# Production-like stack (nginx serves SPA + proxies /api to backend)
# =============================================================================
# From repo root:
#   docker compose -f docker-compose.prd.yml up --build -d
#
# URLs:
#   App (nginx):  http://localhost:8080
#   Backend is NOT exposed on the host (only reachable as backend:3001 inside the network).
#   PostgreSQL is NOT exposed on the host (only postgres:5432 inside the network).
#
# To backup the DB, run pg_dump inside the postgres container (see docs/docker-data.md).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-miniboard}
    volumes:
      - postgres_data_prd:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miniboard"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      args:
        DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    env_file:
      - .env.prd
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Built from nginx/Dockerfile (Vite build + nginx:alpine)
  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data_prd:
